<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agentheim — Design System</title>
  <link rel="stylesheet" href="styles/colors_and_type.css" />
  <link rel="stylesheet" href="styles/agentheim.css" />
  <style>
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body { background: var(--surface-0); color: var(--fg-1); }
    *, *::before, *::after { box-sizing: border-box; }
    button { font-family: inherit; }
    ::selection { background: var(--accent-ochre-soft); color: var(--fg-1); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/marked@12.0.2/marked.min.js"></script>

  <script type="text/babel" src="app/data.jsx"></script>
  <script type="text/babel" src="app/icons.jsx"></script>
  <script type="text/babel" src="app/primitives.jsx"></script>
  <script type="text/babel" src="app/empty.jsx"></script>
  <script type="text/babel" src="app/kanban.jsx"></script>
  <script type="text/babel" src="app/drawer.jsx"></script>
  <script type="text/babel" src="app/library.jsx"></script>
  <script type="text/babel" src="app/foundations.jsx"></script>
  <script type="text/babel" src="app/foundations2.jsx"></script>
  <script type="text/babel" src="app/live.jsx"></script>
  <script type="text/babel" src="app/app.jsx"></script>

  <script type="text/babel" data-presets="react">
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
